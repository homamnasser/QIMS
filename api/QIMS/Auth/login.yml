info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:8000/api/loginUser
  body:
    type: multipart-form
    data:
      - name: email
        type: text
        value: superadmin@gmail.com
      - name: password
        type: text
        value: "123456789"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
